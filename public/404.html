<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found · DesignXFactor</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #050508; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    main { max-width: 540px; padding: 2rem 1.5rem; text-align: center; }
    .code { font-size: clamp(4rem, 12vw, 7rem); font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(135deg, #f5f5f7 0%, #8b8b95 100%); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; margin: 0 0 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.75rem; }
    p { color: #a0a0a8; margin: 0 0 2rem; line-height: 1.5; }
    a { display: inline-block; padding: 0.75rem 1.5rem; background: #f5f5f7; color: #050508; text-decoration: none; border-radius: 999px; font-weight: 600; transition: transform 0.15s ease; }
    a:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>This page wandered off.</h1>
    <p>The link you followed may be broken, or the page may have moved.</p>
    <a href="/">Back to home</a>
  </main>
</body>
</html>
